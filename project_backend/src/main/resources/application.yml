spring:
  application:
    name: project_backend
  datasource:
    url: jdbc:mysql://localhost:3306/schoolProjectDB?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ***
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted

server:
  port: 8080

app:
  image:
    save-path: D:/school_project/project_backend/images
    cleanup-days: 7
  ai:
    python-url: http://127.0.0.1:5000
